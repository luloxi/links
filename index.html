<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lulox • Links</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        :root {
            --primary: #6366f1;
        }
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .font-display {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            font-weight: 600;
        }

        .link-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .link-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        .glass {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
        }

        .dark .glass {
            background: rgba(23, 23, 23, 0.95);
        }

        .section-header {
            font-size: 13px;
            letter-spacing: -.5px;
            font-weight: 600;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <div class="max-w-[420px] mx-auto min-h-screen px-5 pt-10 pb-16">
        <!-- Profile -->
        <div class="flex flex-col items-center text-center">
            <!-- Avatar -->
            <div class="w-24 h-24 rounded-3xl overflow-hidden ring-4 ring-zinc-800 mb-5 shadow-xl">
                <img src="https://picsum.photos/id/1011/300/300" alt="Lulox" class="w-full h-full object-cover">
            </div>
            
            <h1 class="font-display text-4xl font-semibold tracking-tighter">Lulox</h1>
            <p class="text-zinc-400 mt-1.5 text-lg">@lulox</p>
            
            <div class="mt-3 px-4 py-1.5 bg-zinc-900 rounded-2xl text-sm flex items-center gap-x-2">
                <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
                <span class="text-emerald-400 font-medium">Midnight Ambassador @ IOG</span>
            </div>
        </div>

        <!-- Bio -->
        <div class="mt-8 text-center px-2">
            <p class="text-zinc-400 text-[15px] leading-snug">
                Midnight Ambassador • Cardano • DeFi • Tokenización en Argentina
            </p>
        </div>

        <!-- Links -->
        <div class="mt-10 space-y-3">
            
            <!-- Main Links -->
            <div>
                <div class="section-header px-1 mb-3 text-zinc-500">PROYECTOS</div>
                
                <a href="https://luloxi.github.io/tokenizacion-ar/" target="_blank" 
                   class="link-card flex items-center gap-4 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 hover:border-zinc-700 px-5 py-4 rounded-3xl group">
                    <div class="w-10 h-10 flex-shrink-0 rounded-2xl bg-indigo-600 flex items-center justify-center">
                        <i class="fa-solid fa-globe text-white text-xl"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="font-semibold">Tokenización AR</div>
                        <div class="text-sm text-zinc-400">Marco legal + Cardano + Midnight</div>
                    </div>
                    <i class="fa-solid fa-arrow-up-right-from-square text-zinc-500 group-hover:text-white transition-colors"></i>
                </a>
            </div>

            <div>
                <div class="section-header px-1 mb-3 text-zinc-500 mt-6">REDES &amp; CONTACTO</div>
                
                <div class="space-y-3">
                    <!-- Twitter -->
                    <a href="https://x.com/lulox" target="_blank" 
                       class="link-card flex items-center gap-4 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 hover:border-zinc-700 px-5 py-4 rounded-3xl group">
                        <div class="w-10 h-10 flex-shrink-0 rounded-2xl bg-black flex items-center justify-center">
                            <i class="fa-brands fa-x-twitter text-white text-xl"></i>
                        </div>
                        <div class="flex-1 font-semibold">X / Twitter</div>
                        <i class="fa-solid fa-arrow-up-right-from-square text-zinc-500 group-hover:text-white transition-colors"></i>
                    </a>
                    
                    <!-- GitHub -->
                    <a href="https://github.com/luloxi" target="_blank" 
                       class="link-card flex items-center gap-4 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 hover:border-zinc-700 px-5 py-4 rounded-3xl group">
                        <div class="w-10 h-10 flex-shrink-0 rounded-2xl bg-zinc-800 flex items-center justify-center">
                            <i class="fa-brands fa-github text-white text-xl"></i>
                        </div>
                        <div class="flex-1 font-semibold">GitHub</div>
                        <i class="fa-solid fa-arrow-up-right-from-square text-zinc-500 group-hover:text-white transition-colors"></i>
                    </a>
                    
                    <!-- LinkedIn -->
                    <a href="#" target="_blank" 
                       class="link-card flex items-center gap-4 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 hover:border-zinc-700 px-5 py-4 rounded-3xl group">
                        <div class="w-10 h-10 flex-shrink-0 rounded-2xl bg-blue-600 flex items-center justify-center">
                            <i class="fa-brands fa-linkedin-in text-white text-xl"></i>
                        </div>
                        <div class="flex-1 font-semibold">LinkedIn</div>
                        <i class="fa-solid fa-arrow-up-right-from-square text-zinc-500 group-hover:text-white transition-colors"></i>
                    </a>
                </div>
            </div>
            
        </div>

        <div class="mt-14 text-center">
            <p class="text-[10px] text-zinc-600">Hecho con ♥ por Lulox</p>
        </div>
    </div>
</body>
</html>
